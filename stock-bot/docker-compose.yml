services:
  stock-bot:
    build:
      context: ..
      dockerfile: stock-bot/Dockerfile
    image: stock-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NANOBOT_WORKSPACE: /stock-bot/workspace
    volumes:
      - ./workspace:/stock-bot/workspace
      - ./config.json:/stock-bot/config.json:ro
    ports:
      - "18791:18791"
      - "8766:8766"
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18791/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
